<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regicide — The Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chess.css">
</head>
<body>

  <div class="page-background">
    <div class="bg-glow bg-glow-left"></div>
    <div class="bg-glow bg-glow-right"></div>
    <div class="bg-grain"></div>
  </div>

  <div class="game-wrapper">

    <header class="top-bar">
      <a href="/" class="back-link">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </a>
      <div class="game-heading">
        <svg width="22" height="18" viewBox="0 0 64 48" fill="none">
          <path d="M4 40 L12 16 L24 28 L32 8 L40 28 L52 16 L60 40 Z" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linejoin="round"/>
          <path d="M4 40 L60 40" stroke="#c9a84c" stroke-width="2"/>
          <circle cx="32" cy="8" r="3" fill="#c9a84c"/>
          <circle cx="4"  cy="40" r="2.5" fill="#c9a84c"/>
          <circle cx="60" cy="40" r="2.5" fill="#c9a84c"/>
          <circle cx="12" cy="16" r="2" fill="#c9a84c"/>
          <circle cx="52" cy="16" r="2" fill="#c9a84c"/>
        </svg>
        REGICIDE
      </div>
      <div class="turn-badge" id="turnBadge">WHITE'S TURN</div>
    </header>

    <div class="board-area">

      <div class="captured-panel panel-left" id="capturedBlack">
        <div class="panel-label">CAPTURED</div>
        <div class="captured-pieces" id="eatenBlack"></div>
      </div>

      <div class="board-frame">
        <div class="rank-labels">
          <span>8</span><span>7</span><span>6</span><span>5</span>
          <span>4</span><span>3</span><span>2</span><span>1</span>
        </div>
        <div id="chess-board"></div>
        <div class="file-labels">
          <span>a</span><span>b</span><span>c</span><span>d</span>
          <span>e</span><span>f</span><span>g</span><span>h</span>
        </div>
      </div>

      <div class="captured-panel panel-right" id="capturedWhite">
        <div class="panel-label">CAPTURED</div>
        <div class="captured-pieces" id="eatenWhite"></div>
      </div>

      <aside class="game-panel">
        <button class="surrender-btn" id="surrenderButton">SURRENDER</button>
        <div class="move-eval" id="moveEval">AWAITING MOVE</div>
        <div class="history-block">
          <div class="panel-label">HISTORY</div>
          <div class="move-history" id="moveHistory"></div>
        </div>
      </aside>

    </div>

  </div>

  <div id="upgrade-modal" class="promo-modal">
    <div class="promo-title">PROMOTE PAWN</div>
    <div class="promo-options">
      <div class="promo-choice" id="upgrade-queen">
        <span class="promo-piece">♕</span>
        <span class="promo-name">Queen</span>
      </div>
      <div class="promo-choice" id="upgrade-rook">
        <span class="promo-piece">♖</span>
        <span class="promo-name">Rook</span>
      </div>
      <div class="promo-choice" id="upgrade-bishop">
        <span class="promo-piece">♗</span>
        <span class="promo-name">Bishop</span>
      </div>
      <div class="promo-choice" id="upgrade-knight">
        <span class="promo-piece">♘</span>
        <span class="promo-name">Knight</span>
      </div>
    </div>
  </div>

  <div id="game-over-modal" class="result-modal hidden">
    <div class="result-crown">♛</div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-subtitle" id="resultSubtitle"></div>
    <a href="/" class="result-btn">PLAY AGAIN</a>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop"></div>

  <script src="chess.js"></script>
</body>
</html>
