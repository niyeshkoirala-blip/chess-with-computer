<header class="auth-headbar" aria-label="Account actions">
  <button class="auth-headbar-button" type="button" data-auth-open="login">Login</button>
  <button class="auth-headbar-button" type="button" data-auth-open="signup">Signup</button>
</header>

<div class="auth-overlay" data-auth-overlay>
  <section class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="authDialogTitle">
    <button class="auth-close" type="button" data-auth-close aria-label="Close account panel">&times;</button>

    <div class="auth-side auth-form-side" data-auth-form-side>
      <form class="auth-form auth-signup-form is-active" data-auth-form="signup">
        <div class="auth-form-heading">
          <p class="auth-kicker">Join the court</p>
          <h2 class="auth-title" id="authDialogTitle">Create Account</h2>
        
        </div>

        <div class="auth-field">
          <label for="authSignupName">Username</label>
          <input id="authSignupName" name="username" type="text" autocomplete="username" placeholder="Choose your name" required>
        </div>

        <div class="auth-field">
          <label for="authSignupEmail">Email</label>
          <input id="authSignupEmail" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
        </div>

        <div class="auth-field">
          <label for="authSignupPassword">Password</label>
          <input id="authSignupPassword" name="password" type="password" autocomplete="new-password" placeholder="Create a password" required>
        </div>

        <button class="auth-primary-button" action="/signup" type="submit">Create Account</button>
      </form>

      <form class="auth-form auth-login-form" data-auth-form="login">
        <div class="auth-form-heading">
          <p class="auth-kicker">Return to battle</p>
          <h2 class="auth-title">LOGIN TO YOUR ACCOUNT</h2>
          
        </div>

        <div class="auth-field">
          <label for="authLoginIdentity">Email or Username</label>
          <input id="authLoginIdentity" name="identity" type="text" autocomplete="username" placeholder="Your account" required>
        </div>

        <div class="auth-field">
          <label for="authLoginPassword">Password</label>
          <input id="authLoginPassword" name="password" type="password" autocomplete="current-password" placeholder="Your password" required>
        </div>

        <button class="auth-primary-button" action="/login" type="submit">Login</button>
      </form>
    </div>

    <aside class="auth-side auth-message-side" data-auth-message-side>
      <div class="auth-message-mark">R</div>
      <p class="auth-kicker" data-auth-kicker>Welcome back</p>
      <h3 class="auth-title" data-auth-title>Previously here?</h3>
      <p class="auth-copy" data-auth-copy>Step through the gilded gate and continue your campaign.</p>
      <button class="auth-ghost-button" type="button" data-auth-switch>Login</button>
    </aside>
  </section>
</div>
